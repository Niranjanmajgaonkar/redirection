<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Choose Your App Store</title>

    <style>
      :root {
        --bg-1: #f4f6ff;
        --bg-2: #e6ecff;
        --text: #111827;
        --muted: #6b7280;
        --android: #16a34a;
        --ios: #000000;
        --card: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 10% 20%, #ffffff 0%, transparent 40%),
          radial-gradient(circle at 90% 80%, #c7d2fe 0%, transparent 45%),
          linear-gradient(135deg, var(--bg-1), var(--bg-2));
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .overlay {
        width: 100%;
        padding: 24px;
      }

      .modal {
        width: min(720px, 100%);
        margin: auto;
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 255, 255, 0.9);
        border-radius: 24px;
        padding: 30px;
        box-shadow:
          0 25px 60px rgba(0, 0, 0, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.8);
        animation: floatCard 6s ease-in-out infinite;
      }

      @keyframes floatCard {
        0%,100% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
      }

      .heading {
        text-align: center;
        margin-bottom: 6px;
        font-size: clamp(1.6rem, 2vw, 2.2rem);
        font-weight: 700;
      }

      .subheading {
        text-align: center;
        margin: 0 0 28px;
        color: var(--muted);
      }

      .popup-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(220px, 1fr));
        gap: 20px;
        perspective: 1200px;
      }

      .popup-card {
        background: var(--card);
        border-radius: 20px;
        padding: 26px 18px;
        text-align: center;
        cursor: pointer;
        text-decoration: none;
        color: inherit;
        position: relative;
        transform-style: preserve-3d;
        transform: rotateX(6deg) rotateY(-6deg);
        box-shadow:
          0 12px 25px rgba(0, 0, 0, 0.08),
          0 25px 45px rgba(0, 0, 0, 0.08);
        transition: all 0.35s cubic-bezier(.17,.67,.38,1.4);
        overflow: hidden;
      }

      /* Hover effect (Desktop) */
      .popup-card:hover {
        transform: rotateX(0deg) rotateY(0deg) translateY(-10px) scale(1.03);
        box-shadow:
          0 18px 35px rgba(0, 0, 0, 0.12),
          0 35px 60px rgba(0, 0, 0, 0.15);
      }

      /* Click animation (Mobile + Desktop press) */
      .popup-card:active {
        transform: scale(0.96);
        box-shadow:
          0 6px 12px rgba(0, 0, 0, 0.15) inset;
      }

      /* Glow animation */
      .popup-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          120deg,
          transparent 20%,
          rgba(255,255,255,0.6),
          transparent 80%
        );
        transform: translateX(-100%);
        transition: 0.6s;
      }

      .popup-card:hover::before {
        transform: translateX(100%);
      }

      .icon {
        width: 60px;
        height: 60px;
        border-radius: 16px;
        margin: 0 auto 14px;
        display: grid;
        place-items: center;
        font-weight: 700;
        color: #fff;
        font-size: 1.2rem;
        box-shadow: 0 8px 18px rgba(0,0,0,0.15);
      }

      .android .icon {
        background: linear-gradient(135deg, #22c55e, #15803d);
      }

      .ios .icon {
        background: linear-gradient(135deg, #333, #000);
      }

      .title {
        margin: 0 0 6px;
        font-size: 1.2rem;
        font-weight: 600;
      }

      .desc {
        margin: 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      @media (max-width: 640px) {
        .popup-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <main class="overlay">
      <section class="modal" aria-label="Store selection popup">
        <h1 class="heading">Select Your Device</h1>
        <p class="subheading">Tap one popup to continue to your app store.</p>

        <div class="popup-grid">
          <a
            class="popup-card android"
            href="https://play.google.com/store/apps/details?id=com.swt.passilo"
            target="_blank"
            rel="noopener noreferrer"
          >
            <div class="icon">A</div>
            <h2 class="title">Android</h2>
            <p class="desc">Open Play Store / APK link</p>
          </a>

          <a
            class="popup-card ios"
            href="https://apps.apple.com/in/app/passilo/id6759452123"
            target="_blank"
            rel="noopener noreferrer"
          >
            <div class="icon">iOS</div>
            <h2 class="title">iOS</h2>
            <p class="desc">Open Apple App Store link</p>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
