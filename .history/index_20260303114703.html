<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Choose Your App Store</title>
    <style>
      :root {
        --bg-1: #f7f8fc;
        --bg-2: #e9eef8;
        --text: #1a2233;
        --muted: #5d6880;
        --android: #15a04a;
        --ios: #111111;
        --card: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 10% 10%, #ffffff 0%, transparent 35%),
          radial-gradient(circle at 85% 90%, #dbe5fb 0%, transparent 45%),
          linear-gradient(135deg, var(--bg-1), var(--bg-2));
      }

      .overlay {
        min-height: 100vh;
        width: 100%;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .modal {
        width: min(720px, 100%);
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.9);
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 18px 45px rgba(19, 36, 73, 0.12);
      }

      .heading {
        text-align: center;
        margin-bottom: 6px;
        font-size: clamp(1.4rem, 2vw, 2rem);
      }

      .subheading {
        text-align: center;
        margin: 0 0 24px;
        color: var(--muted);
      }

      .popup-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(220px, 1fr));
        gap: 16px;
      }

      .popup-card {
        background: var(--card);
        border: 1px solid #e8edfb;
        border-radius: 16px;
        padding: 22px 16px;
        text-align: center;
        cursor: pointer;
        text-decoration: none;
        color: inherit;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .popup-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 30px rgba(23, 47, 99, 0.12);
      }

      .icon {
        width: 52px;
        height: 52px;
        border-radius: 12px;
        margin: 0 auto 10px;
        display: grid;
        place-items: center;
        font-weight: 700;
        color: #fff;
        font-size: 1.1rem;
      }

      .android .icon {
        background: var(--android);
      }

      .ios .icon {
        background: var(--ios);
      }

      .title {
        margin: 0 0 6px;
        font-size: 1.1rem;
      }

      .desc {
        margin: 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      @media (max-width: 640px) {
        .modal {
          padding: 22px 16px;
        }

        .popup-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="overlay">
      <section class="modal" aria-label="Store selection popup">
        <h1 class="heading">Select Your Device</h1>
        <p class="subheading">Tap one popup to continue to your app store.</p>

        <div class="popup-grid">
          <a
            class="popup-card android"
            href="https://drive.google.com/file/d/18PgP1O3514AukRI9qVWLe4Q-lNeP2omg/view?usp=sharing"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Open Android app link"
          >
            <div class="icon">A</div>
            <h2 class="title">Android Link</h2>
            <p class="desc">Open Play Store / APK link</p>
          </a>

          <a
            class="popup-card ios"
            href="https://apps.apple.com/in/app/passilo/id6759452123"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Open iOS app link"
          >
            <div class="icon">iOS</div>
            <h2 class="title">iOS Link</h2>
            <p class="desc">Open Apple App Store link</p>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
