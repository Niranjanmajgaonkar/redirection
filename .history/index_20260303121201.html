<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Download Passilo App</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg-1: #f8fafc;
  --bg-2: #eef2ff;
  --card: rgba(255,255,255,0.85);
  --border: rgba(0,0,0,0.06);
  --text: #0f172a;
  --muted: #64748b;
  --android: #16a34a;
  --ios: #111827;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Soft animated background glow */
body::before {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, #6366f122, transparent 70%);
  top: -150px;
  left: -150px;
  animation: float 8s infinite alternate ease-in-out;
}

body::after {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, #22c55e22, transparent 70%);
  bottom: -120px;
  right: -120px;
  animation: float 10s infinite alternate ease-in-out;
}

@keyframes float {
  from { transform: translateY(0px); }
  to { transform: translateY(40px); }
}

.modal {
  width: min(820px, 95%);
  padding: 40px;
  border-radius: 24px;
  background: var(--card);
  backdrop-filter: blur(14px);
  border: 1px solid var(--border);
  box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
  text-align: center;
  animation: fadeUp 0.8s ease;
  position: relative;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

h1 {
  margin: 0;
  font-size: 2rem;
  font-weight: 700;
}

p {
  margin: 12px 0 30px;
  color: var(--muted);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px,1fr));
  gap: 24px;
}

.card {
  padding: 28px;
  border-radius: 20px;
  background: white;
  border: 1px solid var(--border);
  text-decoration: none;
  color: var(--text);
  transition: all 0.35s ease;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
  position: relative;
  overflow: hidden;
}

.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 18px 40px rgba(0,0,0,0.1);
}

.icon {
  font-size: 2.5rem;
  margin-bottom: 15px;
}

.android .icon { color: var(--android); }
.ios .icon { color: var(--ios); }

.title {
  font-size: 1.2rem;
  font-weight: 600;
}

.desc {
  font-size: 0.9rem;
  color: var(--muted);
  margin-top: 6px;
}

.footer {
  margin-top: 30px;
  font-size: 0.8rem;
  color: #94a3b8;
}

@media(max-width: 600px){
  .modal { padding: 25px; }
  h1 { font-size: 1.5rem; }
}
</style>
</head>

<body>

<div class="modal">
  <h1>Download Passilo App</h1>
  <p>Select your device to continue to the official store.</p>

  <div class="grid">

    <a class="card android"
       href="https://play.google.com/store/apps/details?id=com.swt.passilo"
       target="_blank">
      <div class="icon">🤖</div>
      <div class="title">Android</div>
      <div class="desc">Open Google Play Store</div>
    </a>

    <a class="card ios"
       href="https://apps.apple.com/in/app/passilo/id6759452123"
       target="_blank">
      <div class="icon"></div>
      <div class="title">iOS</div>
      <div class="desc">Open Apple App Store</div>
    </a>

  </div>

  <div class="footer">
    © 2026 Passilo. All rights reserved.
  </div>
</div>

</body>
</html>
