<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Choose Your App Store</title>
    <style>
      :root {
        --bg-1: #f7f8fc;
        --bg-2: #e9eef8;
        --text: #1a2233;
        --muted: #5d6880;
        --android: #15a04a;
        --ios: #394154;
        --card: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 10% 10%, #ffffff 0%, transparent 35%),
          radial-gradient(circle at 85% 90%, #dbe5fb 0%, transparent 45%),
          linear-gradient(135deg, var(--bg-1), var(--bg-2));
      }

      .overlay {
        min-height: 100vh;
        width: 100%;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .modal {
        width: min(720px, 100%);
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.9);
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 18px 45px rgba(19, 36, 73, 0.12);
      }

      .heading {
        text-align: center;
        margin-bottom: 6px;
        font-size: clamp(1.4rem, 2vw, 2rem);
      }

      .subheading {
        text-align: center;
        margin: 0 0 24px;
        color: var(--muted);
      }

      .popup-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(220px, 1fr));
        gap: 16px;
        perspective: 1200px;
      }

      .popup-card {
        background: var(--card);
        border: 1px solid #e8edfb;
        border-radius: 16px;
        padding: 22px 16px;
        text-align: center;
        cursor: pointer;
        text-decoration: none;
        color: inherit;
        position: relative;
        transform-style: preserve-3d;
        transform: rotateX(2deg) rotateY(-2deg) translateZ(0);
        box-shadow:
          0 7px 14px rgba(19, 36, 73, 0.06),
          0 14px 24px rgba(19, 36, 73, 0.05),
          inset 0 1px 0 rgba(255, 255, 255, 0.7);
        transition: transform 0.28s ease, box-shadow 0.28s ease;
        overflow: hidden;
      }

      .popup-card:hover {
        transform: rotateX(0deg) rotateY(0deg) translateY(-6px) translateZ(22px);
        box-shadow:
          0 12px 20px rgba(19, 36, 73, 0.08),
          0 22px 30px rgba(19, 36, 73, 0.1),
          inset 0 1px 0 rgba(255, 255, 255, 0.8);
      }

      .popup-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.55) 0%,
          rgba(255, 255, 255, 0) 45%
        );
        pointer-events: none;
      }

      .popup-card::after {
        content: "";
        position: absolute;
        left: 14px;
        right: 14px;
        bottom: -14px;
        height: 24px;
        border-radius: 50%;
        background: rgba(17, 36, 79, 0.06);
        filter: blur(10px);
        transform: translateZ(-30px);
        z-index: -1;
      }

      .icon {
        width: 52px;
        height: 52px;
        border-radius: 12px;
        margin: 0 auto 10px;
        display: grid;
        place-items: center;
        font-weight: 700;
        color: #fff;
        font-size: 1.1rem;
      }

      .android .icon {
        background: var(--android);
      }

      .ios .icon {
        background: var(--ios);
      }

      .title {
        margin: 0 0 6px;
        font-size: 1.1rem;
      }

      .desc {
        margin: 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      @media (max-width: 640px) {
        .modal {
          padding: 22px 16px;
        }

        .popup-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="overlay">
      <section class="modal" aria-label="Store selection popup">
        <h1 class="heading">Select Your Device</h1>
        <p class="subheading">Tap one popup to continue to your app store.</p>

        <div class="popup-grid">
          <a
            class="popup-card android"
            href="https://play.google.com/store/apps/details?id=com.swt.passilo"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Open Android app link"
          >
            <div class="icon">A</div>
            <h2 class="title">Android</h2>
            <p class="desc">Open Play Store / APK link</p>
          </a>

          <a
            class="popup-card ios"
            href="https://apps.apple.com/in/app/passilo/id6759452123"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Open iOS app link"
          >
            <div class="icon">iOS</div>
            <h2 class="title">iOS</h2>
            <p class="desc">Open Apple App Store link</p>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
